<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>For My Forever Bestie 💖</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  text-align: center;
  background: #ffc0cb; /* PINK ALWAYS */
  color: black;
  overflow-x: hidden;
}

/* Countdown */
#countdown {
  margin-top: 20%;
}

#timer {
  font-size: 40px;
  margin-top: 20px;
  font-weight: bold;
}

/* Surprise */
#surprise {
  display: none;
  padding: 20px;
}

img {
  width: 250px;
  margin: 10px;
  border-radius: 20px;
  box-shadow: 0 0 20px hotpink;
}

/* Floating hearts */
.heart {
  position: fixed;
  color: deeppink;
  animation: floatUp 6s linear infinite;
}

@keyframes floatUp {
  0% { transform: translateY(100vh); opacity: 1; }
  100% { transform: translateY(-10vh); opacity: 0; }
}

/* Confetti */
.confetti {
  position: fixed;
  width: 10px;
  height: 10px;
  top: -10px;
  animation: fall linear infinite;
}

@keyframes fall {
  to { transform: translateY(100vh); }
}
</style>
</head>

<body>

<div id="countdown">
  <h1>For My Favorite Human 💕</h1>
  <h2 id="timer"></h2>
</div>

<div id="surprise">
  <h1>HAPPY BIRTHDAY MY BEST FRIEND 🎉💖</h1>
  <p>You are my sister, my safe place, my forever person 🥹</p>
  <p>I’m so grateful for every memory we share 💕</p>

  <img src="photo1.jpg">
  <img src="photo2.jpg">
  <img src="photo3.jpg">

  <h2>Forever & Always 💗</h2>

  <audio id="music" autoplay loop>
    <source src="song.mp3" type="audio/mpeg">
  </audio>
</div>

<script>
const birthday = new Date("March 29, 2026 00:00:00").getTime();

const timerFunction = setInterval(function() {
  const now = new Date().getTime();
  const distance = birthday - now;

  if (distance > 0) {
    const days = Math.floor(distance / (1000 * 60 * 60 * 24));
    document.getElementById("timer").innerHTML =
      days + " more days until your special day 💖";
  } else {
    clearInterval(timerFunction);
    document.getElementById("countdown").style.display = "none";
    document.getElementById("surprise").style.display = "block";

    // Confetti
    for (let i = 0; i < 150; i++) {
      let confetti = document.createElement("div");
      confetti.className = "confetti";
      confetti.style.left = Math.random() * 100 + "vw";
      confetti.style.backgroundColor =
        ["red","blue","yellow","green","purple","orange"]
        [Math.floor(Math.random()*6)];
      confetti.style.animationDuration = (Math.random()*3+2) + "s";
      document.body.appendChild(confetti);
    }

    document.getElementById("music").play();
  }

}, 1000);

/* Floating hearts always */
setInterval(function() {
  let heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "💖";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (Math.random()*20 + 15) + "px";
  document.body.appendChild(heart);

  setTimeout(() => heart.remove(), 6000);
}, 500);
</script>

</body>
</html>
